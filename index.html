<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecotone Robotics — Coming Soon</title>
<meta name="description" content="Ecotone Robotics builds modular tethered payload systems for conservation, forestry, and environmental monitoring. Based in Hawaii.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #059669;
  --green-dark: #047857;
  --green-light: #10b981;
  --text: #1a1a1a;
  --text-secondary: #555555;
  --text-muted: #888888;
  --text-subtle: #cccccc;
  --border: #e0e0e0;
  --font: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }

body {
  font-family: var(--font);
  color: var(--text);
  background: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

.container {
  text-align: center;
  padding: 2rem;
  max-width: 600px;
}

.logo {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 3rem;
  letter-spacing: -0.02em;
}

.brand-name { color: var(--green); }
.brand-slash { color: var(--text-muted); }
.brand-section { color: var(--text-muted); font-weight: 400; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.cursor {
  animation: blink 1s step-end infinite;
  color: var(--green);
}

.tagline {
  font-size: 1.1rem;
  font-weight: 300;
  color: #ffffff;
  text-transform: lowercase;
  margin-bottom: 1rem;
  line-height: 1.4;
}

.tagline em {
  font-style: normal;
  color: var(--green);
}

.sub {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 3rem;
}

.status {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: var(--text-muted);
  border: 1px solid #333;
  border-radius: 0;
  padding: 0.5rem 1rem;
  margin-bottom: 2rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
}

.contact-link {
  display: block;
  font-size: 0.85rem;
  color: var(--green);
  text-decoration: none;
  border-bottom: 1px solid var(--green);
  padding-bottom: 0.15rem;
  transition: color 0.2s;
  display: inline-block;
}

.contact-link:hover {
  color: var(--green-light);
  border-color: var(--green-light);
}

.location {
  margin-top: 2.5rem;
  font-size: 0.7rem;
  color: #444;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.location::before {
  content: '> ';
  color: var(--green);
}

footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 1rem;
  text-align: center;
  font-size: 0.7rem;
  color: #444;
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <span class="brand-name">ecotone</span><span class="brand-slash">/</span><span class="brand-section">robotics</span><span class="cursor">_</span>
  </div>

  <h1 class="tagline">coming soon</h1>
  <p class="sub">Modular tethered payload systems for conservation, forestry, and environmental monitoring.</p>

  <div class="status">
    <span class="status-dot"></span> site updating — check back soon
  </div>

  <br><br>

  <a href="mailto:info@ecotonerobotics.com" class="contact-link">info@ecotonerobotics.com</a>


</div>

<footer>&copy; 2026 Ecotone Robotics LLC</footer>

</body>
</html>
