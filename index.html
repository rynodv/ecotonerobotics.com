<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecotone Robotics</title>
<meta name="description" content="Ecotone Robotics — custom sensor payloads and hardware for aerial platforms. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1D9E75;
  --green-dark: #167a5a;
  --black: #0a0a0a;
  --gray-500: #888;
  --gray-300: #ccc;
  --white: #fff;
  --font-body: 'DM Sans', sans-serif;
  --font-display: 'DM Serif Display', serif;
}
 
* { margin: 0; padding: 0; box-sizing: border-box; }
 
body {
  font-family: var(--font-body);
  background: var(--black);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
 
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(29,158,117,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 30%, rgba(29,158,117,0.04) 0%, transparent 50%);
  pointer-events: none;
}
 
.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
  max-width: 600px;
}
 
.logo {
  font-family: var(--font-body);
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 3rem;
  opacity: 0;
  animation: fadeUp 0.8s 0.2s forwards;
}
 
.logo .eco { color: var(--green); }
.logo .tone { color: var(--white); }
.logo .robotics {
  display: block;
  font-size: 0.4em;
  font-weight: 400;
  color: var(--gray-500);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}
 
h1 {
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  line-height: 1.3;
  margin-bottom: 1.2rem;
  opacity: 0;
  animation: fadeUp 0.8s 0.4s forwards;
}
 
h1 em {
  font-style: italic;
  color: var(--green);
}
 
.tagline {
  font-size: 1rem;
  color: var(--gray-500);
  line-height: 1.7;
  margin-bottom: 3rem;
  opacity: 0;
  animation: fadeUp 0.8s 0.6s forwards;
}
 
.contact-link {
  display: inline-block;
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--white);
  text-decoration: none;
  padding: 0.8rem 2rem;
  border: 1px solid var(--green);
  border-radius: 4px;
  transition: all 0.25s;
  letter-spacing: 0.02em;
  opacity: 0;
  animation: fadeUp 0.8s 0.8s forwards;
}
 
.contact-link:hover {
  background: var(--green);
  color: var(--white);
}
 
.footer {
  position: fixed;
  bottom: 2rem;
  font-size: 0.75rem;
  color: var(--gray-500);
  opacity: 0;
  animation: fadeUp 0.8s 1s forwards;
}
 
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
 
@media (max-width: 480px) {
  .logo { font-size: 1.6rem; }
  .container { padding: 1.5rem; }
}
</style>
</head>
<body>
 
<div class="container">
  <div class="logo">
    <span class="eco">eco</span><span class="tone">tone</span>
    <span class="robotics">Robotics</span>
  </div>
  <h1>Coming <em>soon</em></h1>
  <p class="tagline">Custom sensor payloads and hardware integration for aerial platforms.</p>
  <a href="mailto:ryno@ecotonerobotics.com" class="contact-link">ryno@ecotonerobotics.com</a>
</div>
 
<div class="footer">&copy; 2026 Ecotone Robotics LLC</div>
 
</body>
</html>
